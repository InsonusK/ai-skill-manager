sources:
  - path: https://github.com/InsonusK/ai-skills.git
    type: github
    tree: master
    subpath:
      - skills/python
      - skills/dotnet
      - skills/devops
      - skills/common-workflow
      - skills/angular

settings:
  target: 
    for_each:
      adapters:
        - link-adapter
    default:
      path: tmp/.agents/skills
    claude:
      path: tmp/.claude/skills
      adapters:
        - claude-property-adapter
  remove_orphans: true
  on_conflict: error
  dry_run: false