sources:
  - path: https://github.com/InsonusK/ai-skills.git
    type: github
    tree: master
    subpath:
      - skills/python/architecture/solutions/solution-default-cli.skill
      - skills/common-workflow/develop/logging-principle.skill.md
      - skills/common-workflow/test
      - skills/common-workflow/work-in-git-tree.skill.md
      - skills/common-workflow/documentation
      - skills/common-workflow/skill-design.skill
      - skills/common-workflow/architecture/design/solid-decomposition.skill
      - skills/common-workflow/architecture/design/plateau-update-by-solutions.skill
      - skills/devops/devops-github-wf-pr-validation.skill
      
settings:
  target: 
    for_each:
      adapters:
        - link-adapter
    default:
      path: .agents/skills
    claude:
      path: .claude/skills
      adapters:
        - claude-property-adapter
  remove_orphans: true
  on_conflict: error
  dry_run: false
  add_relations: true